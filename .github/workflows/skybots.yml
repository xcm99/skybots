name: Skybots Auto Renew
on:
  workflow_dispatch:
  schedule:
    - cron: '30 2 * * *'

jobs:
  run_renewal:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: .

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb xdotool
          python -m pip install --upgrade pip
          pip install seleniumbase requests
          seleniumbase install chromedriver

      - name: Start proxy
        env:
          skybots_PROXY_NODE: ${{ secrets.skybots_PROXY_NODE }}
        run: |
          if [ -z "$skybots_PROXY_NODE" ]; then exit 0; fi
          wget -q https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
          gunzip gost-linux-amd64-2.11.5.gz
          chmod +x gost-linux-amd64-2.11.5
          nohup ./gost-linux-amd64-2.11.5 -L :8080 -F "$skybots_PROXY_NODE" > gost.log 2>&1 &
          sleep 5
          echo "PROXY_URL=socks5://127.0.0.1:8080" >> $GITHUB_ENV

      - name: Run script
        env:
          S_A: ${{ secrets.SKYBOTS_ACCOUNT }}
          S_P: ${{ secrets.SKYBOTS_PASSWORD }}
          N_T: ${{ secrets.TG_BOT_TOKEN }}
          N_I: ${{ secrets.TG_CHAT_ID }}
          berry_PROXY_NODE: ${{ env.PROXY_URL }}
        run: |
          xvfb-run -a python skybots.py
