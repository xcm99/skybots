name: Skybots Auto Renew
on:
  workflow_dispatch:
  schedule:
    - cron: '30 2 * * *'

jobs:
  run_renewal:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          path: .

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb xdotool
          
          python -m pip install --upgrade pip
          pip install seleniumbase requests
          seleniumbase install chromedriver

      - name: Start Proxy Tunnel
        env:
          berry_PROXY_NODE: ${{ secrets.berry_PROXY_NODE }}
        run: |
          if [ -z "$berry_PROXY_NODE" ]; then exit 0; fi
          wget -q https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
          gunzip gost-linux-amd64-2.11.5.gz
          chmod +x gost-linux-amd64-2.11.5
          nohup ./gost-linux-amd64-2.11.5 -L :8080 -F "$berry_PROXY_NODE" > gost.log 2>&1 &
          sleep 5
          echo "berry_PROXY_NODE=socks5://127.0.0.1:8080" >> $GITHUB_ENV

      - name: Run Skybots Python Script
        env:
          SKYBOTS_ACCOUNT: ${{ secrets.SKYBOTS_ACCOUNT }}
          SKYBOTS_PASSWORD: ${{ secrets.SKYBOTS_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          xvfb-run -a python skybots.py
