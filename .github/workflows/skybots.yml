name: 🤖 Skybots Auto Renew
on:
  workflow_dispatch:
  schedule:
    - cron: '30 2 * * *' # 每天 UTC 2:30 运行

# ⚠️ 必须要有写入权限，为了把新获取的 Cookie 提交回仓库
permissions:
  contents: write

jobs:
  run_renewal:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # 防止过盾时卡死导致资源浪费

    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4
        with:
          path: .

      - name: 🟢 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 安装依赖 & 虚拟显示器 (应对 CF 盾)
        run: |
          npm init -y
          # 安装 Playwright 核心、隐身插件增强包
          npm install playwright playwright-extra puppeteer-extra-plugin-stealth
          npx playwright install chromium --with-deps
          # 安装 xvfb 虚拟显示器，供 headless: false 模式使用
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: 🛡️ 启动 GOST 代理隧道
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          if [ -z "$GOST_PROXY" ]; then
            echo "[INFO] 未配置代理，降级为直连模式"
            exit 0
          fi
          echo "📦 下载并启动 GOST..."
          wget -q https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
          gunzip gost-linux-amd64-2.11.5.gz
          chmod +x gost-linux-amd64-2.11.5
          nohup ./gost-linux-amd64-2.11.5 -L :8080 -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 5
          echo "✅ GOST 已启动，测试连通性..."
          curl -s -x http://127.0.0.1:8080 https://api.ipify.org
          # 写入环境变量，供 JS 脚本读取
          echo "PROXY_URL=http://127.0.0.1:8080" >> $GITHUB_ENV

      - name: 🚀 运行 Skybots 脚本 (带虚拟屏幕)
        env:
          SKYBOTS_ACCOUNT: ${{ secrets.SKYBOTS_ACCOUNT }}
          SKYBOTS_PASSWORD: ${{ secrets.SKYBOTS_PASSWORD }}
          # PROXY_URL 会自动从 GITHUB_ENV 读取
        run: |
          # 【核心】使用 xvfb-run 启动 Node.js，欺骗 CF 盾以为有真实物理屏幕
          xvfb-run -a node skybots.js

      - name: 💾 提交会话状态 (Cookie)
        if: success()
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          if [[ -n $(git status -s auth_state.json) ]]; then
            echo "检测到会话状态更新，正在提交..."
            git add auth_state.json
            git commit -m "Auto-update auth state [skip ci]"
            git push
          else
            echo "会话状态无变化，跳过提交。"
          fi

      - name: 📸 上传报错截图
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: skybots-debug
          path: skybots_error.png
          retention-days: 5
