name: 🤖 Skybots Auto Renew
on:
  workflow_dispatch:
  schedule:
    - cron: '30 1 */2 * *'

jobs:
  run_renewal:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: write
      contents: write

    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4
        with:
          path: .
          # 使用你添加的 REPO_TOKEN 来获取修改工作流文件的权限
          token: ${{ secrets.REPO_TOKEN }}

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 安装底层依赖与浏览器
        run: |
          # 【核心】安装 xdotool(用于物理点击) 和 xvfb(虚拟屏幕)
          sudo apt-get update
          sudo apt-get install -y xvfb xdotool
          
          # 安装 SeleniumBase 并初始化 Chrome
          python -m pip install --upgrade pip
          pip install seleniumbase requests
          seleniumbase install chromedriver

      - name: 🛡️ 启动 GOST 代理隧道
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          if [ -z "$GOST_PROXY" ]; then exit 0; fi
          wget -q https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
          gunzip gost-linux-amd64-2.11.5.gz
          chmod +x gost-linux-amd64-2.11.5
          nohup ./gost-linux-amd64-2.11.5 -L :8080 -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 5
          echo "PROXY_URL=socks5://127.0.0.1:8080" >> $GITHUB_ENV

      - name: 🚀 运行 Skybots Python 脚本
        env:
          SKYBOTS_ACCOUNT: ${{ secrets.SKYBOTS_ACCOUNT }}
          SKYBOTS_PASSWORD: ${{ secrets.SKYBOTS_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          # 使用 xvfb-run 分配虚拟屏幕，让 xdotool 能够正常点击
          xvfb-run -a python skybots.py

      - name: 自动修改下一次运行时间
        env:
          # 推送时也调用你的 REPO_TOKEN
          GITHUB_TOKEN: ${{ secrets.REPO_TOKEN }}
          WORKFLOW_FILE: .github/workflows/skybots.yml # ⚠️ 注意：如果你实际的 yml 文件名不是 skybots.yml，请在这里修改为你真实的文件路径！
        run: |
          python3 << 'EOF'
          import re
          import os
          from datetime import datetime, timedelta

          workflow_file = os.environ.get("WORKFLOW_FILE")
          date_file = 'next_time.txt'
          
          # 使用 UTC 时间作为基准计算 cron
          now_utc = datetime.utcnow()
          target_date = None
          
          if os.path.exists(date_file):
              with open(date_file, 'r', encoding='utf-8') as f:
                  content = f.read()
              
              # 匹配类似于 "9j 22h" 或 "9d 23h" 的时间格式
              match = re.search(r'(\d+)\s*[dj]\s*(\d+)\s*h', content, re.IGNORECASE)
              if match:
                  days = int(match.group(1))
                  hours = int(match.group(2))
                  
                  # 计算面板上的实际到期时间
                  expire_time = now_utc + timedelta(days=days, hours=hours)
                  
                  # 目标运行时间设定为：到期前 2 天
                  target_date = expire_time - timedelta(days=2)

          if target_date and target_date > now_utc:
              cron_month = target_date.month
              cron_day = target_date.day
              cron_hour = target_date.hour
              cron_minute = target_date.minute
              
              next_date_str = f"{target_date.strftime('%Y-%m-%d %H:%M')} UTC (到期前2天执行)"
              new_cron = f"{cron_minute} {cron_hour} {cron_day} {cron_month} *"
          else:
              # 如果解析失败或时间已过，使用兜底方案：明天同一时间重试
              tomorrow_utc = now_utc + timedelta(days=1)
              new_cron = f"{tomorrow_utc.minute} {tomorrow_utc.hour} * * *"
              next_date_str = f"{tomorrow_utc.strftime('%Y-%m-%d %H:%M')} UTC (兜底方案)"

          try:
              with open(workflow_file, 'r', encoding='utf-8') as f:
                  content = f.read()

              # 替换 cron 表达式
              new_content = re.sub(
                  r"- cron: '.*?'.*",
                  f"- cron: '{new_cron}' # 下一个: {next_date_str}",
                  content,
                  count=1
              )

              with open(workflow_file, 'w', encoding='utf-8') as f:
                  f.write(new_content)
              print(f"✅ 已精准将下一次运行时间更新为: {new_cron} (目标时间: {next_date_str})")
          except Exception as e:
              print(f"❌ 修改 yml 文件失败: {e}")
              exit(1)
          EOF

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add $WORKFLOW_FILE
          git commit -m "🚀 auto: 精准锁定到期前两天执行续期" || echo "没有变更需要提交"
          
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git push

      - name: 🧹 清理旧的运行记录 (仅保留最近 5 个)
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.REPO_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 5
